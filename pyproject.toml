[project]
name = "qhld-tasks"
version = "1.0.0"
description = "QHLD Tasks"
requires-python = ">=3.12"
dependencies = [
    "qhld-data @ git+https://github.com/politicalwatch/qhld-data.git",
    "celery[redis]==5.4.0",
    "certifi==2024.8.30",
    "chardet==5.2.0",
    "idna==3.10",
    "jinja2>=3.1.0",
    "markupsafe==3.0.2",
    "mongoengine==0.29.1",
    "pymongo==4.10.1",
    "python-slugify==8.0.4",
    "pytz==2024.2",
    "regex==2024.11.6",
    "requests==2.32.3",
    "six==1.16.0",
    "sparkpost==1.3.10",
    "urllib3==2.6.3",
]

[dependency-groups]
dev = ["ipdb==0.13.13"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["tipi_tasks"]
